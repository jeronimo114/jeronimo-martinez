<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="llmGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#0a0a0a"/>

  <!-- Input Box -->
  <rect x="30" y="60" width="120" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <text x="90" y="95" text-anchor="middle" fill="#a0a0a0" font-family="-apple-system, sans-serif" font-size="12">INPUT</text>
  <text x="90" y="115" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="14">"Hola mundo"</text>

  <!-- Arrow 1 -->
  <path d="M 160 100 L 210 100" stroke="#007AFF" stroke-width="3" fill="none"/>
  <polygon points="210,100 200,95 200,105" fill="#007AFF"/>

  <!-- LLM Box -->
  <rect x="220" y="40" width="160" height="120" rx="16" fill="url(#llmGradient)" opacity="0.9"/>
  <text x="300" y="85" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="24" font-weight="700">LLM</text>
  <text x="300" y="110" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="-apple-system, sans-serif" font-size="11">Predice siguiente token</text>
  <text x="300" y="130" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, sans-serif" font-size="10">token por token</text>

  <!-- Arrow 2 -->
  <path d="M 390 100 L 440 100" stroke="#007AFF" stroke-width="3" fill="none"/>
  <polygon points="440,100 430,95 430,105" fill="#007AFF"/>

  <!-- Output Box -->
  <rect x="450" y="60" width="120" height="80" rx="12" fill="#1a1a1a" stroke="#30D158" stroke-width="2"/>
  <text x="510" y="95" text-anchor="middle" fill="#30D158" font-family="-apple-system, sans-serif" font-size="12">OUTPUT</text>
  <text x="510" y="115" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="14">"!"</text>
</svg>
