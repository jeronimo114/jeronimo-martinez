<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220">
  <!-- Background -->
  <rect width="700" height="220" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="16" font-weight="600">Proyecto: Gmail → Sheets</text>

  <!-- Gmail Box -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="150" height="100" rx="16" fill="#1a1a1a" stroke="#EA4335" stroke-width="3"/>
    <!-- Gmail icon simplified -->
    <rect x="45" y="25" width="60" height="40" rx="4" fill="#EA4335"/>
    <polygon points="75,25 45,50 45,25" fill="#C5221F"/>
    <polygon points="75,25 105,50 105,25" fill="#C5221F"/>
    <polygon points="75,45 45,65 45,50 75,25 105,50 105,65" fill="#F4B400"/>
    <text x="75" y="85" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="12" font-weight="600">Gmail</text>
    <text x="75" y="130" text-anchor="middle" fill="#a0a0a0" font-family="-apple-system, sans-serif" font-size="10">Trigger</text>
    <text x="75" y="145" text-anchor="middle" fill="#555" font-family="-apple-system, sans-serif" font-size="9">"Llega email"</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(210, 100)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#007AFF" stroke-width="3"/>
    <polygon points="60,0 50,-5 50,5" fill="#007AFF"/>
  </g>

  <!-- n8n Box -->
  <g transform="translate(275, 60)">
    <rect x="0" y="0" width="150" height="100" rx="16" fill="#1a1a1a" stroke="#007AFF" stroke-width="3"/>
    <!-- n8n logo simplified -->
    <circle cx="75" cy="40" r="20" fill="#007AFF" opacity="0.2"/>
    <text x="75" y="48" text-anchor="middle" fill="#007AFF" font-family="-apple-system, sans-serif" font-size="20" font-weight="800">n8n</text>
    <text x="75" y="85" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="12" font-weight="600">Procesa</text>
    <text x="75" y="130" text-anchor="middle" fill="#a0a0a0" font-family="-apple-system, sans-serif" font-size="10">Workflow</text>
    <text x="75" y="145" text-anchor="middle" fill="#555" font-family="-apple-system, sans-serif" font-size="9">"Extrae datos"</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(435, 100)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#007AFF" stroke-width="3"/>
    <polygon points="60,0 50,-5 50,5" fill="#007AFF"/>
  </g>

  <!-- Sheets Box -->
  <g transform="translate(500, 60)">
    <rect x="0" y="0" width="150" height="100" rx="16" fill="#1a1a1a" stroke="#34A853" stroke-width="3"/>
    <!-- Sheets icon simplified -->
    <rect x="45" y="20" width="60" height="50" rx="4" fill="#34A853"/>
    <line x1="55" y1="32" x2="95" y2="32" stroke="#fff" stroke-width="2"/>
    <line x1="55" y1="45" x2="95" y2="45" stroke="#fff" stroke-width="2"/>
    <line x1="55" y1="58" x2="95" y2="58" stroke="#fff" stroke-width="2"/>
    <line x1="65" y1="25" x2="65" y2="65" stroke="#fff" stroke-width="1"/>
    <text x="75" y="85" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="12" font-weight="600">Sheets</text>
    <text x="75" y="130" text-anchor="middle" fill="#a0a0a0" font-family="-apple-system, sans-serif" font-size="10">Accion</text>
    <text x="75" y="145" text-anchor="middle" fill="#555" font-family="-apple-system, sans-serif" font-size="9">"Nueva fila"</text>
  </g>

  <!-- Result note -->
  <text x="350" y="200" text-anchor="middle" fill="#30D158" font-family="-apple-system, sans-serif" font-size="12" font-weight="600">Cada email = nueva fila automatica</text>
</svg>
