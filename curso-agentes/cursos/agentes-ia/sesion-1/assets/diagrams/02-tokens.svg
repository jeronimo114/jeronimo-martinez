<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180">
  <!-- Background -->
  <rect width="600" height="180" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" fill="#fff" font-family="-apple-system, sans-serif" font-size="18" font-weight="600">automatizacion</text>
  <text x="300" y="55" text-anchor="middle" fill="#a0a0a0" font-family="-apple-system, sans-serif" font-size="12">dividida en tokens</text>

  <!-- Tokens -->
  <g transform="translate(75, 75)">
    <!-- Token 1 -->
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#FF6B6B"/>
    <text x="50" y="37" text-anchor="middle" fill="#fff" font-family="SF Mono, monospace" font-size="18" font-weight="500">auto</text>

    <!-- Token 2 -->
    <rect x="115" y="0" width="80" height="60" rx="8" fill="#4ECDC4"/>
    <text x="155" y="37" text-anchor="middle" fill="#fff" font-family="SF Mono, monospace" font-size="18" font-weight="500">mat</text>

    <!-- Token 3 -->
    <rect x="210" y="0" width="60" height="60" rx="8" fill="#45B7D1"/>
    <text x="240" y="37" text-anchor="middle" fill="#fff" font-family="SF Mono, monospace" font-size="18" font-weight="500">iz</text>

    <!-- Token 4 -->
    <rect x="285" y="0" width="100" height="60" rx="8" fill="#96CEB4"/>
    <text x="335" y="37" text-anchor="middle" fill="#fff" font-family="SF Mono, monospace" font-size="18" font-weight="500">acion</text>

    <!-- Token 5 (tilde) - shown separately -->
    <rect x="400" y="0" width="50" height="60" rx="8" fill="#FFEAA7"/>
    <text x="425" y="37" text-anchor="middle" fill="#333" font-family="SF Mono, monospace" font-size="18" font-weight="500">~</text>
  </g>

  <!-- Token count -->
  <text x="300" y="165" text-anchor="middle" fill="#007AFF" font-family="-apple-system, sans-serif" font-size="14" font-weight="600">= 4-5 tokens</text>
</svg>
