<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#0a0a0a"/>

  <!-- System message -->
  <g transform="translate(30, 20)">
    <rect x="0" y="0" width="340" height="60" rx="8" fill="#1a1a1a" stroke="#007AFF" stroke-width="2" stroke-left="4"/>
    <rect x="0" y="0" width="4" height="60" fill="#007AFF"/>
    <text x="20" y="22" fill="#007AFF" font-family="-apple-system, sans-serif" font-size="10" font-weight="600">SISTEMA</text>
    <text x="20" y="42" fill="#fff" font-family="-apple-system, sans-serif" font-size="13">"Eres un asistente de ventas amable"</text>
  </g>

  <!-- User message 1 -->
  <g transform="translate(30, 90)">
    <rect x="0" y="0" width="340" height="60" rx="8" fill="#1a1a1a" stroke="#30D158" stroke-width="2"/>
    <rect x="0" y="0" width="4" height="60" fill="#30D158"/>
    <text x="20" y="22" fill="#30D158" font-family="-apple-system, sans-serif" font-size="10" font-weight="600">USUARIO</text>
    <text x="20" y="42" fill="#fff" font-family="-apple-system, sans-serif" font-size="13">"Cuanto cuesta el plan pro?"</text>
  </g>

  <!-- Assistant message -->
  <g transform="translate(30, 160)">
    <rect x="0" y="0" width="340" height="60" rx="8" fill="#1a1a1a" stroke="#BF5AF2" stroke-width="2"/>
    <rect x="0" y="0" width="4" height="60" fill="#BF5AF2"/>
    <text x="20" y="22" fill="#BF5AF2" font-family="-apple-system, sans-serif" font-size="10" font-weight="600">ASISTENTE</text>
    <text x="20" y="42" fill="#fff" font-family="-apple-system, sans-serif" font-size="13">"El plan pro cuesta $99/mes..."</text>
  </g>

  <!-- User message 2 -->
  <g transform="translate(30, 230)">
    <rect x="0" y="0" width="340" height="60" rx="8" fill="#1a1a1a" stroke="#30D158" stroke-width="2"/>
    <rect x="0" y="0" width="4" height="60" fill="#30D158"/>
    <text x="20" y="22" fill="#30D158" font-family="-apple-system, sans-serif" font-size="10" font-weight="600">USUARIO</text>
    <text x="20" y="42" fill="#fff" font-family="-apple-system, sans-serif" font-size="13">"Incluye soporte?"</text>
  </g>
</svg>
